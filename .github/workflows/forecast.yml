name: forecast-dashboard

# クラウド(GitHub)上で定期実行する。あなたのPCの電源状態に依存しない。
on:
  workflow_dispatch:           # cron-job.org または Actionsタブから手動実行

permissions:
  contents: write              # 生成物を同じリポジトリに push するため

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 日本語フォント(チャートの文字化け防止)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 予測を取得 (Open-Meteo -> wind.db)
        run: python collect_forecasts.py

      - name: バイアス補正データをプライベートリポジトリから取得
        env:
          TOKEN: ${{ secrets.PRIVATE_WIND_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            curl -fsSL \
              -H "Authorization: token $TOKEN" \
              "https://raw.githubusercontent.com/makoaso-sys/wind/main/ushibuse-wind/calibration.json" \
              -o calibration.json \
              && echo "calibration.json を取得しました" \
              || echo "calibration.json の取得に失敗しました（補正なしで実行）"
          else
            echo "PRIVATE_WIND_TOKEN が未設定のため補正なしで実行"
          fi

      - name: 観測データをプライベートリポジトリから取得 (実測オーバーレイ用)
        env:
          TOKEN: ${{ secrets.PRIVATE_WIND_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            curl -fsSL \
              -H "Authorization: token $TOKEN" \
              "https://raw.githubusercontent.com/makoaso-sys/wind/main/ushibuse-wind/observations.db" \
              -o observations.db \
              && echo "observations.db を取得しました（直近12hの実測を重ねる）" \
              || echo "observations.db の取得に失敗しました（実測オーバーレイなしで実行）"
          else
            echo "PRIVATE_WIND_TOKEN が未設定のため実測オーバーレイなしで実行"
          fi

      - name: ダッシュボード生成 (docs/index.html, docs/forecast.png)
        run: python generate_dashboard.py

      # ── 任意: 走れそうなら ntfy でスマホ通知 ──
      # Secrets に NTFY_TOPIC を登録し、下のコメントを外す
      # - name: 通知
      #   run: python notify.py --topic "${{ secrets.NTFY_TOPIC }}"

      - name: コミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs wind.db
          git commit -m "update forecast $(date -u +%FT%TZ)" || echo "no changes"
          git push
